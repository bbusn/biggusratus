services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8443:8443"
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    depends_on:
      - server
    environment:
      - PYTHONUNBUFFERED=1
    network_mode: host
